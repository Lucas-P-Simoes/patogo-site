<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Sentimos sua saída — PatoGo</title>
  <link rel="icon" href="/icons/pato.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
                   Ubuntu, Cantarell, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 640px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo img {
      width: 64px;
      height: 64px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ddd;
    }

    select, textarea, input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    select:focus, textarea:focus, input[type="text"]:focus {
      outline: none;
      border-color: #00b894;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 184, 148, 0.3);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success-message {
      display: none;
      text-align: center;
      padding: 32px 16px;
    }

    .success-message.visible { display: block; }

    .success-message .check {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .success-message h2 {
      font-size: 22px;
      margin-bottom: 12px;
      color: #00b894;
    }

    .success-message p {
      color: #aaa;
      font-size: 16px;
    }

    .error-message {
      display: none;
      background: #2a1414;
      border: 1px solid #5a2222;
      color: #ff7676;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
    }

    .error-message.visible { display: block; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      color: #666;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .container { padding: 28px 20px; }
      h1 { font-size: 22px; }
      .subtitle { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="/icons/pato.png" alt="PatoGo" onerror="this.style.display='none'">
    </div>

    <div id="formWrapper">
      <h1>Sentimos sua saída 😢</h1>
      <p class="subtitle">Seu feedback ajuda o PatoGo a melhorar.</p>

      <form id="feedbackForm" novalidate>
        <div class="field">
          <label for="reason">Motivo principal da desinstalação *</label>
          <select id="reason" name="reason" required>
            <option value="">Selecione um motivo…</option>
            <option value="Não entendi como usar">Não entendi como usar</option>
            <option value="Tive problemas ou bugs">Tive problemas ou bugs</option>
            <option value="Achei caro">Achei caro</option>
            <option value="Faltou alguma funcionalidade">Faltou alguma funcionalidade</option>
            <option value="Não uso mais">Não uso mais</option>
            <option value="Encontrei outra ferramenta">Encontrei outra ferramenta</option>
            <option value="Outro motivo">Outro motivo</option>
          </select>
        </div>

        <div class="field">
          <label for="missingFeature">O que faltou para você continuar usando?</label>
          <textarea id="missingFeature" name="missing_feature" rows="3"
                    placeholder="Conta pra gente o que poderia ter sido melhor…"></textarea>
        </div>

        <div class="field">
          <label for="desiredFeature">Qual funcionalidade você gostaria de ver no PatoGo?</label>
          <textarea id="desiredFeature" name="desired_feature" rows="3"
                    placeholder="Descreva uma funcionalidade que faria diferença pra você…"></textarea>
        </div>

        <div class="field">
          <label for="comment">Conte mais detalhes, se quiser</label>
          <textarea id="comment" name="comment" rows="4"
                    placeholder="Comentário livre…"></textarea>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Enviar feedback</button>

        <div class="error-message" id="errorMessage"></div>
      </form>

      <p class="footer-note">
        Suas respostas são anônimas para outros usuários e usadas apenas para melhorar o PatoGo.
      </p>
    </div>

    <div class="success-message" id="successMessage">
      <div class="check">🦆💚</div>
      <h2>Obrigado pelo feedback!</h2>
      <p>Isso nos ajuda muito a melhorar o PatoGo.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
